<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Insurance Cost Predictor</title>
<style>
  :root {
    --bg1: #1e1b4b;
    --bg2: #0f172a;
    --card: #ffffff;
    --text-dark: #1e293b;
    --text-muted: #64748b;
    --primary: #7c3aed;
    --primary-light: #a78bfa;
    --accent: #ec4899;
    --success: #10b981;
    --error: #ef4444;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    font-family: var(--font);
    background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 440px;
    background: var(--card);
    border-radius: 24px;
    padding: 36px 32px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: "";
    position: absolute;
    top: -60px;
    right: -60px;
    width: 180px;
    height: 180px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-radius: 50%;
    opacity: 0.15;
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .icon-badge {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 14px;
    font-size: 26px;
  }

  h1 {
    font-size: 22px;
    color: var(--text-dark);
    font-weight: 700;
  }

  .header p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .field {
    margin-bottom: 18px;
  }

  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dark);
    margin-bottom: 6px;
  }

  .field label .unit {
    font-weight: 400;
    color: var(--text-muted);
  }

  .field input,
  .field select {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #e2e8f0;
    border-radius: 12px;
    font-size: 15px;
    font-family: var(--font);
    color: var(--text-dark);
    background: #f8fafc;
    outline: none;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .field input:focus,
  .field select:focus {
    border-color: var(--primary);
    background: #fff;
  }

  .toggle-group {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
  }

  .toggle-option {
    flex: 1;
    text-align: center;
    padding: 10px;
    border-radius: 12px;
    border: 1.5px solid #e2e8f0;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
  }

  .toggle-option.active {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-color: transparent;
    color: #fff;
  }

  button#predict-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    font-family: var(--font);
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(124, 58, 237, 0.35);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  button#predict-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 30px rgba(124, 58, 237, 0.45);
  }

  button#predict-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .result {
    margin-top: 22px;
    padding: 20px;
    border-radius: 16px;
    background: linear-gradient(135deg, #ecfdf5, #f0fdfa);
    border: 1.5px solid #a7f3d0;
    text-align: center;
    display: none;
  }

  .result.visible { display: block; }

  .result.error-state {
    background: #fef2f2;
    border-color: #fecaca;
  }

  .result-label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .result-amount {
    font-size: 34px;
    font-weight: 800;
    color: var(--success);
    margin-top: 6px;
  }

  .result-amount .period {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-muted);
  }

  .result-amount.error-text {
    color: var(--error);
    font-size: 15px;
    font-weight: 500;
  }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 20px;
  }
</style>
</head>
<body>

  <div class="card">
    <div class="header">
      <div class="icon-badge">🩺</div>
      <h1>Insurance Cost Predictor</h1>
      <p>Get an instant premium estimate</p>
    </div>

    <form id="predict-form">
      <div class="field">
        <label for="age">Age <span class="unit">(years)</span></label>
        <input type="number" id="age" placeholder="e.g. 32" min="1" max="120" required />
      </div>

      <div class="field">
        <label for="bmi">BMI <span class="unit">(body mass index)</span></label>
        <input type="number" id="bmi" placeholder="e.g. 26" step="0.1" min="1" max="80" required />
      </div>

      <div class="field">
        <label for="smoker">Smoker</label>
        <select id="smoker" required>
          <option value="" disabled selected>Select an option</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>

      <div class="field">
        <label for="children">Number of Children</label>
        <input type="number" id="children" placeholder="e.g. 2" min="0" max="10" required />
      </div>

      <label style="display:block; font-size:13px; font-weight:600; color:var(--text-dark); margin-bottom:8px;">
        Show estimate as
      </label>
      <div class="toggle-group">
        <div class="toggle-option active" id="opt-yearly" data-mode="yearly">Per Year</div>
        <div class="toggle-option" id="opt-monthly" data-mode="monthly">Per Month</div>
      </div>

      <button type="submit" id="predict-btn">Predict Cost</button>
    </form>

    <div class="result" id="result-block">
      <div class="result-label">Estimated Cost</div>
      <div class="result-amount" id="result-amount"></div>
    </div>

    <div class="footer-note">Estimate based on a linear regression model trained on 1,338 records.</div>
  </div>

<script>
  const form = document.getElementById('predict-form');
  const btn = document.getElementById('predict-btn');
  const resultBlock = document.getElementById('result-block');
  const resultAmount = document.getElementById('result-amount');
  const optYearly = document.getElementById('opt-yearly');
  const optMonthly = document.getElementById('opt-monthly');

  let mode = 'yearly';
  let lastYearlyPrediction = null;

  function renderResult() {
    if (lastYearlyPrediction === null) return;
    const value = mode === 'yearly' ? lastYearlyPrediction : lastYearlyPrediction / 12;
    const formatted = value.toLocaleString('en-IN', { maximumFractionDigits: 0 });
    const periodLabel = mode === 'yearly' ? 'per year' : 'per month';
    resultAmount.classList.remove('error-text');
    resultAmount.innerHTML = '₹' + formatted + ' <span class="period">' + periodLabel + '</span>';
  }

  optYearly.addEventListener('click', () => {
    mode = 'yearly';
    optYearly.classList.add('active');
    optMonthly.classList.remove('active');
    renderResult();
  });

  optMonthly.addEventListener('click', () => {
    mode = 'monthly';
    optMonthly.classList.add('active');
    optYearly.classList.remove('active');
    renderResult();
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const age = document.getElementById('age').value;
    const bmi = document.getElementById('bmi').value;
    const smoker = document.getElementById('smoker').value;
    const children = document.getElementById('children').value;

    btn.disabled = true;
    btn.textContent = 'Predicting...';

    try {
      const res = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ age, bmi, smoker, children })
      });

      const data = await res.json();
      resultBlock.classList.add('visible');

      if (!res.ok) {
        resultBlock.classList.add('error-state');
        resultAmount.classList.add('error-text');
        resultAmount.textContent = data.error || 'Something went wrong';
        lastYearlyPrediction = null;
      } else {
        resultBlock.classList.remove('error-state');
        lastYearlyPrediction = data.prediction;
        renderResult();
      }
    } catch (err) {
      resultBlock.classList.add('visible', 'error-state');
      resultAmount.classList.add('error-text');
      resultAmount.textContent = 'Could not reach the server.';
      lastYearlyPrediction = null;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Predict Cost';
    }
  });
</script>

</body>
</html>
