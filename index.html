<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Insurance Cost Predictor</title>
<style>
  :root {
    --bg: #0b0d0f;
    --panel: #111417;
    --border: #262b30;
    --text: #d7e6ea;
    --text-dim: #6f8087;
    --accent: #5fd0e8;
    --accent-soft: #2b6a78;
    --result: #7dffb3;
    --error: #ff7a7a;
    --font: "JetBrains Mono", "Fira Code", "SFMono-Regular", Consolas, monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .terminal {
    width: 100%;
    max-width: 480px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(95, 208, 232, 0.03), 0 20px 60px rgba(0,0,0,0.5);
  }

  .titlebar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: #0e1114;
    border-bottom: 1px solid var(--border);
  }

  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.red { background: #ff5f56; }
  .dot.yellow { background: #ffbd2e; }
  .dot.green { background: #27c93f; }

  .titlebar span {
    margin-left: 8px;
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 0.03em;
  }

  .screen {
    padding: 24px 26px 28px;
  }

  h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    margin: 0 0 22px;
    letter-spacing: 0.02em;
  }

  h1::before {
    content: "$ ";
    color: var(--text-dim);
  }

  .field {
    margin-bottom: 18px;
  }

  .field label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
    text-transform: lowercase;
  }

  .bracket-input {
    display: flex;
    align-items: center;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #0d1013;
    transition: border-color 0.15s ease;
  }

  .bracket-input:focus-within {
    border-color: var(--accent-soft);
  }

  .bracket-input span {
    color: var(--text-dim);
    padding: 0 10px;
    font-size: 14px;
  }

  .bracket-input input,
  .bracket-input select {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 10px 4px;
    -moz-appearance: none;
    -webkit-appearance: none;
    appearance: none;
  }

  .bracket-input select {
    cursor: pointer;
  }

  .bracket-input select option {
    background: var(--panel);
    color: var(--text);
  }

  button#predict-btn {
    width: 100%;
    margin-top: 6px;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--accent-soft);
    color: var(--accent);
    font-family: var(--font);
    font-size: 14px;
    letter-spacing: 0.05em;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }

  button#predict-btn:hover {
    background: var(--accent);
    color: #06171a;
  }

  button#predict-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .result-block {
    margin-top: 24px;
    padding-top: 18px;
    border-top: 1px dashed var(--border);
    display: none;
  }

  .result-block.visible {
    display: block;
  }

  .result-label {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .result-value {
    font-size: 30px;
    font-weight: 700;
    color: var(--result);
    letter-spacing: 0.01em;
  }

  .result-value.error {
    color: var(--error);
    font-size: 15px;
    font-weight: 500;
  }

  .cursor {
    display: inline-block;
    width: 8px;
    height: 16px;
    background: var(--accent);
    margin-left: 4px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .footnote {
    margin-top: 18px;
    font-size: 11px;
    color: var(--text-dim);
  }
</style>
</head>
<body>

  <div class="terminal">
    <div class="titlebar">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <span>insurance-predictor</span>
    </div>

    <div class="screen">
      <h1>Insurance Cost Predictor</h1>

      <form id="predict-form">
        <div class="field">
          <label for="age">Age</label>
          <div class="bracket-input">
            <span>[</span>
            <input type="number" id="age" name="age" placeholder="32" min="1" max="120" required />
            <span>]</span>
          </div>
        </div>

        <div class="field">
          <label for="bmi">BMI</label>
          <div class="bracket-input">
            <span>[</span>
            <input type="number" id="bmi" name="bmi" placeholder="26" step="0.1" min="1" max="80" required />
            <span>]</span>
          </div>
        </div>

        <div class="field">
          <label for="smoker">Smoker</label>
          <div class="bracket-input">
            <span>[</span>
            <select id="smoker" name="smoker" required>
              <option value="" disabled selected>Select</option>
              <option value="yes">Yes</option>
              <option value="no">No</option>
            </select>
            <span>]</span>
          </div>
        </div>

        <div class="field">
          <label for="children">Children</label>
          <div class="bracket-input">
            <span>[</span>
            <input type="number" id="children" name="children" placeholder="2" min="0" max="10" required />
            <span>]</span>
          </div>
        </div>

        <button type="submit" id="predict-btn">[ Predict ]</button>
      </form>

      <div class="result-block" id="result-block">
        <div class="result-label">Predicted Cost</div>
        <div class="result-value" id="result-value"></div>
      </div>

      <div class="footnote">Estimate based on a linear regression model trained on 1,338 customer records.</div>
    </div>
  </div>

<script>
  const form = document.getElementById('predict-form');
  const btn = document.getElementById('predict-btn');
  const resultBlock = document.getElementById('result-block');
  const resultValue = document.getElementById('result-value');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const age = document.getElementById('age').value;
    const bmi = document.getElementById('bmi').value;
    const smoker = document.getElementById('smoker').value;
    const children = document.getElementById('children').value;

    btn.disabled = true;
    btn.textContent = '[ Predicting... ]';

    try {
      const res = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ age, bmi, smoker, children })
      });

      const data = await res.json();

      resultBlock.classList.add('visible');

      if (!res.ok) {
        resultValue.classList.add('error');
        resultValue.textContent = data.error || 'Something went wrong';
      } else {
        resultValue.classList.remove('error');
        const formatted = data.prediction.toLocaleString('en-IN', {
          maximumFractionDigits: 0
        });
        resultValue.innerHTML = '₹' + formatted + '<span class="cursor"></span>';
      }
    } catch (err) {
      resultBlock.classList.add('visible');
      resultValue.classList.add('error');
      resultValue.textContent = 'Could not reach the server.';
    } finally {
      btn.disabled = false;
      btn.textContent = '[ Predict ]';
    }
  });
</script>

</body>
</html>
